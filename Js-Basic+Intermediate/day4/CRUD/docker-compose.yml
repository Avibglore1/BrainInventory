

services:
  db:
    image: postgres:16   # latest PostgreSQL image
    container_name: pg_container
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: node_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: 1234
      DB_NAME: postgres
    depends_on:
      - db
    volumes:
      - .:/usr/src/app

volumes:
  pgdata: